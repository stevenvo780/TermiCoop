x-worker-base: &worker-base
  build:
    context: .
    dockerfile: docker/dev/Dockerfile
    args:
      SERVICE: worker
  environment:
    NEXUS_URL: http://nexus:3002
    WORKER_HEARTBEAT_MS: 5000
    AUTO_RESTART_SHELL: "true"
  depends_on:
    - nexus
  security_opt:
    - seccomp=unconfined
    - label=disable

services:
  nexus:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
      args:
        SERVICE: nexus
    environment:
      PORT: 3002
      NEXUS_JWT_SECRET: dev-jwt-secret
      ADMIN_PASSWORD: "dev-change-me"
      WORKER_TOKEN: dev-worker-token-01
      NEXUS_SETUP_TOKEN: dev-setup-token
      ALLOW_UNAUTHENTICATED_WORKERS: "false"
      CLIENT_ORIGIN: http://localhost:5173
      DEV_WORKER_SPECS: "Docker-Dev-Worker-01:dev-worker-token-01,Docker-Dev-Worker-02:dev-worker-token-02,Docker-Dev-Worker-03:dev-worker-token-03,Docker-Dev-Worker-04:dev-worker-token-04,Docker-Dev-Worker-05:dev-worker-token-05,Docker-Dev-Worker-06:dev-worker-token-06,Docker-Dev-Worker-07:dev-worker-token-07,Docker-Dev-Worker-08:dev-worker-token-08"
    volumes:
      - ./.docker-data/nexus:/app/.qodo
    security_opt:
      - seccomp=unconfined
      - label=disable
    ports:
      - "3002:3002"

  worker-01:
    <<: *worker-base
    container_name: termicoop-worker-01
    environment:
      NEXUS_URL: http://nexus:3002
      WORKER_NAME: Docker-Dev-Worker-01
      WORKER_TOKEN: dev-worker-token-01
      WORKER_HEARTBEAT_MS: 5000
      AUTO_RESTART_SHELL: "true"

  worker-02:
    <<: *worker-base
    container_name: termicoop-worker-02
